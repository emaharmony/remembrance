[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "memory-mcp-server"
version = "0.1.0"
description = "Universal memory system for AI agents via MCP"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "Ema"}]

dependencies = [
    "mcp>=1.0.0",
    "torch>=2.0",
    "transformers>=4.35",
    "sentence-transformers>=2.2",
    "sqlite-utils>=3.35",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
    "httpx",
]
api = [
    "fastapi>=0.104",
    "uvicorn>=0.24",
]

[project.scripts]
memory-mcp = "memory_mcp_server:main"

[tool.ruff]
line-length = 100
target-version = "py310"